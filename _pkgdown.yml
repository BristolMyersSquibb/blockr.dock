url: https://bristolmyerssquibb.github.io/blockr.dock/
template:
  bootstrap: 5
  light-switch: true

reference:
- title: Dock Board
  desc: A `board` class that includes dock layout information and board extension object.
  contents:
    - new_dock_board
    - new_dock_stack
- title: Dock layout
  desc: Tools for defining panel arrangements.
  contents:
    - dock_grid
- title: Dock grid
  desc: A view's geometry in canonical form.
  contents:
    - as_dock_grid
- title: Dock layout boundary
  desc: dockView's native layout representation, the wire form at the client boundary.
  contents:
    - new_dock_layout
- title: Panel IDs
  desc: The canonical panel IDs a grid or layout references.
  contents:
    - layout_panel_ids
- title: Dock views
  desc: Multi-view (tabbed) boards. Each view is its own panel arrangement.
  contents:
    - active_view
- title: Board extensions
  desc: Board extensions allow for adding components that interact with and modify board state.
  contents:
    - new_dock_extension
    - new_edit_board_extension
- title: Board actions
  desc: Actions are intended as re-usable, narrowly scoped board interactions, such as adding or removing a block.
  contents:
    - new_action
- title: Utilities
  desc: Various utility functions that are exported for use in dependent packages.
  contents:
    - blks_metadata
    - dock_id
